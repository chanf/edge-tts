services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    ports:
      - "6605:6605"
    environment:
      EDGE_TTS_OUTPUT_DIR: /app/downloads
      EDGE_TTS_STORAGE_MODE: local
      ALLOWED_ORIGINS: "*"
    volumes:
      - ./backend/downloads:/app/downloads

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
      args:
        VITE_API_URL: ""
    ports:
      - "6606:80"
    depends_on:
      - backend
